<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengin Cerita - AgrindPress</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/pengin-cerita.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="pengin-page">
    <hr style="height: 5px; 
               border: none; 
               background-color: #D3649F; 
               opacity: 0.95;
               margin-bottom: 0;
               padding-bottom: 0;">
    <section class="pengin-shell">
      <div class="container-wide">
        <div class="pengin-intro">
          <div class="pengin-copy">
            <p class="pengin-kicker">rubrik khusus</p>
            <h1 class="pengin-title">Pengin Cerita</h1>
            <p class="pengin-lead">
              Ruang cerita buat semua perempuan kuat.
            </p>
          </div>

        
        </div>

        <hr class="pengin-divider">

        <div class="pengin-showcase">
          <div id="pengin-feature"></div>
          <span class="garis-vertikal"></span>
          <aside class="pengin-rail" id="pengin-rail"></aside>
        </div>
      </div>
    </section>

    <section class="pengin-feed-section">
      <div class="container-wide">
        <div class="pengin-feed-head">
          <div>
        </div>
        </div>
          
         <h1 class="pengin-lead">Ceritain aja, biar kami yang simpan.</h1>
         <div class="pengin-divider"></div>

        <div id="pengin-feed" class="pengin-feed"></div>
        <div id="pagination"></div>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module" src="../app/modules/pengin-cerita.js"></script>
